version: "3.9"

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-change-me}
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_GATEWAY_BIND: lan
      OPENCLAW_DISABLE_BONJOUR: "1"
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./state/openclaw:/home/node/.openclaw:Z
      - ./state/workspace:/home/node/.openclaw/workspace:Z
    depends_on:
      - ollama

  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./state/ollama:/root/.ollama:Z

  vllm:
    image: docker.io/vllm/vllm-openai:latest
    container_name: vllm
    restart: unless-stopped
    profiles:
      - vllm
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-vllm-local}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - ${VLLM_API_KEY:-vllm-local}
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./state/vllm-cache:/root/.cache/huggingface:Z
