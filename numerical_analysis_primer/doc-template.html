<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nav-h:       56px;
      --sidebar-w:   320px;
      --sidebar-min: 240px;
      --sidebar-max: 520px;
      --accent:      #2563eb;
      --accent-dark: #1d4ed8;
      --bg:          #f9fafb;
      --surface:     #ffffff;
      --border:      #e5e7eb;
      --text:        #111827;
      --muted:       #6b7280;
      --code-bg:     #1e1e2e;
      --radius:      6px;
      --font-sans:   system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-mono:   "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
    }

    /* ── Top navbar ────────────────────────────────────────────────── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      gap: 1rem;
    }

    .navbar-brand {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .navbar-meta {
      font-size: .8rem;
      opacity: .75;
      white-space: nowrap;
    }

    /* ── Layout shell ──────────────────────────────────────────────── */
    .layout {
      display: flex;
      margin-top: var(--nav-h);
      min-height: calc(100vh - var(--nav-h));
    }

    /* ── Sidebar ───────────────────────────────────────────────────── */
    .sidebar {
      width: clamp(var(--sidebar-min), var(--sidebar-w), var(--sidebar-max));
      min-width: var(--sidebar-min);
      max-width: var(--sidebar-max);
      flex-shrink: 0;
      position: sticky;
      top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.25rem 0;
    }

    .sidebar-resizer {
      width: 10px;
      flex: 0 0 10px;
      cursor: col-resize;
      background: linear-gradient(to right, transparent 0, transparent 40%, var(--border) 40%, var(--border) 60%, transparent 60%, transparent 100%);
      user-select: none;
      touch-action: none;
    }

    .layout.is-resizing,
    .layout.is-resizing * {
      cursor: col-resize;
      user-select: none;
    }

    .sidebar-heading {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      padding: 0 1.25rem .5rem;
    }

    .sidebar-tools {
      padding: 0 1.25rem .75rem;
    }

    .math-mode-btn {
      width: 100%;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: #334155;
      border-radius: 6px;
      padding: .4rem .55rem;
      font-size: .75rem;
      line-height: 1.2;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }

    .math-mode-btn:hover,
    .math-mode-btn:focus {
      background: #eff6ff;
      color: var(--accent);
      border-color: #bfdbfe;
    }

    /* TOC generated by pandoc */
    #TOC {
      font-size: .83rem;
    }

    #TOC ul {
      list-style: none;
      padding: 0;
    }

    #TOC > ul { padding: 0; }

    #TOC li { line-height: 1.4; }

    #TOC a {
      display: block;
      padding: .3rem 1.25rem;
      color: var(--muted);
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: color .15s, border-color .15s, background .15s;
    }

    #TOC a:hover {
      color: var(--accent);
      background: #eff6ff;
      border-left-color: var(--accent);
    }

    /* Indent nested levels */
    #TOC ul ul a   { padding-left: 2rem;   font-size: .78rem; }
    #TOC ul ul ul a { padding-left: 2.75rem; font-size: .75rem; }

    #TOC li.has-toggle > .toc-toggle {
      margin-right: .2rem;
      vertical-align: middle;
    }

    #TOC li.has-toggle > a.toc-link-inline {
      display: inline-block;
      padding-left: 0;
      border-left: none;
      vertical-align: middle;
    }

    #TOC li.has-toggle.toc-depth-2 > .toc-toggle { margin-left: 2rem; }
    #TOC li.has-toggle.toc-depth-3 > .toc-toggle { margin-left: 2.75rem; }

    #TOC li.has-toggle > ul {
      width: 100%;
    }

    /* TOC collapsible controls */
    .toc-toggle {
      background: none;
      border: none;
      padding: 0 .3em 0 0;
      margin: 0;
      cursor: pointer;
      color: #9399b2;
      font-size: 1em;
      line-height: 1;
      vertical-align: middle;
      outline: none;
      transition: color .15s;
    }

    .toc-toggle:focus,
    .toc-toggle:hover {
      color: var(--accent);
    }

    .toc-arrow {
      display: inline-block;
      transition: transform .15s;
    }

    .toc-toggle.expanded .toc-arrow {
      transform: rotate(90deg);
    }

    .toc-toggle.collapsed .toc-arrow {
      transform: rotate(0deg);
    }

    /* ── Main content ──────────────────────────────────────────────── */
    .content {
      flex: 1;
      min-width: 0;
      padding: 2.5rem clamp(1.25rem, 5vw, 3.5rem);
      max-width: 860px;
    }

    /* ── Typography ────────────────────────────────────────────────── */
    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
      line-height: 1.25;
      margin-top: 2em;
      margin-bottom: .6em;
      color: var(--text);
      scroll-margin-top: calc(var(--nav-h) + 1rem);
    }

    h1 { font-size: 2rem; margin-top: 0; }
    h2 { font-size: 1.45rem; border-bottom: 1px solid var(--border); padding-bottom: .35em; }
    h3 { font-size: 1.15rem; }
    h4 { font-size: 1rem; }

    p { margin-bottom: 1rem; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    strong { font-weight: 650; }

    em { font-style: italic; }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    /* ── Tables ────────────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
      margin: 1.5rem 0;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    th {
      background: #f3f4f6;
      font-weight: 650;
      text-align: left;
      padding: .6rem .9rem;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: .55rem .9rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }

    /* ── Code ──────────────────────────────────────────────────────── */
    code {
      font-family: var(--font-mono);
      font-size: .85em;
      background: #f3f4f6;
      color: #be185d;
      padding: .15em .4em;
      border-radius: 3px;
    }

    pre {
      background: var(--code-bg);
      color: #cdd6f4;
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      overflow-x: auto;
      margin: 1.25rem 0;
      font-size: .83rem;
      line-height: 1.6;
      box-shadow: inset 0 1px 4px rgba(0,0,0,.3);
    }

    pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      font-size: inherit;
    }

    /* ── Blockquotes ───────────────────────────────────────────────── */
    blockquote {
      border-left: 4px solid var(--accent);
      margin: 1.5rem 0;
      padding: .75rem 1.25rem;
      background: #eff6ff;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #1e3a5f;
      font-style: italic;
    }

    /* ── Lists ─────────────────────────────────────────────────────── */
    ul, ol {
      padding-left: 1.75rem;
      margin-bottom: 1rem;
    }

    li { margin-bottom: .3rem; }

    /* ── Syntax highlight overrides (tango theme base) ─────────────── */
    $highlighting-css$

    /* ── Code tabs ─────────────────────────────────────────────────── */
    .code-tabs {
      margin: 1.25rem 0;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
    }

    .code-tab-bar {
      display: flex;
      background: #16161f;
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 0 .5rem;
      gap: .15rem;
    }

    .code-tab-btn {
      padding: .45rem 1rem;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #9399b2;
      font-family: var(--font-mono);
      font-size: .78rem;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }

    .code-tab-btn:hover { color: #cdd6f4; }
    .code-tab-btn.active { color: #89b4fa; border-bottom-color: #89b4fa; }

    .code-tab-panel { display: none; }
    .code-tab-panel.active { display: block; }

    .code-tab-panel > div.sourceCode > pre {
      margin: 0;
      border-radius: 0;
      box-shadow: none;
    }

    /* ── Collapsible single code blocks ─────────────────────────────── */
    .code-details {
      margin: 1.25rem 0;
    }

    .code-details > div.sourceCode {
      margin: 0;
    }

    .code-details > div.sourceCode > pre {
      margin: 0;
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: inset 0 1px 4px rgba(0,0,0,.3);
    }

    .code-summary {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .4rem .85rem;
      background: #16161f;
      color: #9399b2;
      font-family: var(--font-mono);
      font-size: .78rem;
      cursor: pointer;
      border-radius: var(--radius) var(--radius) 0 0;
      list-style: none;
      user-select: none;
    }

    .code-summary::-webkit-details-marker { display: none; }

    .code-summary::before {
      content: '▶';
      font-size: .6rem;
      transition: transform .15s;
      flex-shrink: 0;
    }

    details[open] .code-summary::before { transform: rotate(90deg); }

    details:not([open]) .code-details > div.sourceCode > pre {
      border-radius: 0;
    }

    /* ── Responsive: convert sidebar to top TOC on small screens ────── */
    @media (max-width: 768px) {
      .layout {
        display: block;
      }

      .sidebar {
        display: block;
        position: static;
        width: 100%;
        min-width: 0;
        max-width: none;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: .75rem 0;
      }

      .sidebar-heading {
        padding-bottom: .25rem;
      }

      #TOC a {
        padding-top: .4rem;
        padding-bottom: .4rem;
      }

      .sidebar-resizer { display: none; }
      .navbar-meta { display: none; }

      .content {
        max-width: 100%;
        padding-top: 1.25rem;
      }
    }

    /* ── Print ─────────────────────────────────────────────────────── */
    @media print {
      .navbar, .sidebar, .sidebar-resizer { display: none; }
      .content { padding: 0; max-width: 100%; }
    }

    /* ── Custom code color overrides for readability ── */
    code span.fu { color: #c792ea !important; } /* function names: lighter purple */
  </style>
  $math$
</head>
<body>

  <nav class="navbar">
    <span class="navbar-brand">$title$</span>
$if(date)$    <span class="navbar-meta">$date$</span>$endif$
$if(author)$    <span class="navbar-meta">$author$</span>$endif$
  </nav>

  <div class="layout">

    <aside class="sidebar">
      <p class="sidebar-heading">Contents</p>
      <div class="sidebar-tools">
        <button id="math-mode-toggle" class="math-mode-btn" type="button">Switch math renderer</button>
      </div>
$if(toc)$      <div id="TOC" aria-label="Table of contents">$table-of-contents$</div>
$endif$
    </aside>

    <div class="sidebar-resizer" aria-hidden="true" title="Drag to resize sidebar"></div>

    <main class="content">
$body$
    </main>

  </div>

  <script>
    // Robust collapsible TOC logic: wait for #TOC, add logging
    function firstChildByTag(parent, tagName) {
      var children = parent.children;
      for (var i = 0; i < children.length; i++) {
        if (children[i].tagName === tagName) {
          return children[i];
        }
      }
      return null;
    }

    function tocDepth(li, tocRoot) {
      var depth = 0;
      var node = li;
      while (node && node !== tocRoot) {
        if (node.tagName === 'UL') {
          depth += 1;
        }
        node = node.parentElement;
      }
      return depth;
    }

    function makeTOCCollapsible() {
      var toc = document.getElementById('TOC');
      if (!toc) { return false; }
      // Only run once
      if (toc.classList.contains('collapsible-ready')) { return true; }
      toc.classList.add('collapsible-ready');

      Array.prototype.forEach.call(toc.querySelectorAll('li'), function (li) {
        var depth = tocDepth(li, toc);
        li.classList.add('toc-depth-' + String(depth));

        var sublist = firstChildByTag(li, 'UL');
        if (sublist && depth >= 2) {
          var btn = document.createElement('button');
          btn.setAttribute('type', 'button');
          btn.className = 'toc-toggle';
          btn.innerHTML = '<span class="toc-arrow">▶</span>';
          btn.setAttribute('aria-label', 'Expand/collapse section');
          var firstLink = firstChildByTag(li, 'A');
          li.classList.add('has-toggle');
          if (firstLink) {
            firstLink.classList.add('toc-link-inline');
            li.insertBefore(btn, firstLink);
          } else {
            li.insertBefore(btn, li.firstChild);
          }
          sublist.style.display = 'none';
          btn.classList.add('collapsed');
          btn.setAttribute('aria-expanded', 'false');
          btn.addEventListener('click', function () {
            var open = sublist.style.display !== 'none';
            sublist.style.display = open ? 'none' : '';
            btn.classList.toggle('collapsed', open);
            btn.classList.toggle('expanded', !open);
            btn.setAttribute('aria-expanded', open ? 'false' : 'true');
          });
        }
      });
      console.log('[TOC] Collapsible TOC initialized');
      return true;
    }

    // Try on DOMContentLoaded, then poll for late-injected TOC
    function initTOCWithRetries() {
      var tries = 0;
      var maxTries = 20;
      var interval = setInterval(function () {
        var done = makeTOCCollapsible();
        if (done || ++tries > maxTries) clearInterval(interval);
      }, 200);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initTOCWithRetries);
    } else {
      initTOCWithRetries();
    }

    // Math renderer toggle: switch between generated mathjax/mathml files.
    (function initMathModeToggle() {
      var btn = document.getElementById('math-mode-toggle');
      if (!btn) {
        return;
      }

      var path = window.location.pathname || '';
      var targetPath = '';
      var label = '';

      if (path.endsWith('.mathml.html')) {
        targetPath = path.slice(0, -('.mathml.html'.length)) + '.mathjax.html';
        label = 'Switch to MathJax';
      } else if (path.endsWith('.mathjax.html')) {
        targetPath = path.slice(0, -('.mathjax.html'.length)) + '.mathml.html';
        label = 'Switch to MathML';
      } else if (path.endsWith('.html')) {
        targetPath = path.slice(0, -('.html'.length)) + '.mathml.html';
        label = 'Switch to MathML';
      }

      if (!targetPath) {
        btn.style.display = 'none';
        return;
      }

      btn.textContent = label;
      btn.addEventListener('click', function () {
        window.location.href = targetPath + (window.location.search || '') + (window.location.hash || '');
      });
    })();

      // Sidebar resizer logic (existing)
      var root = document.documentElement;
      var layout = document.querySelector('.layout');
      var sidebar = document.querySelector('.sidebar');
      var resizer = document.querySelector('.sidebar-resizer');
      var STORAGE_KEY = 'llm_primer_sidebar_width';

      // if (!layout || !sidebar || !resizer) {
      //   return;
      // }


      function cssPxVar(name, fallback) {
        var raw = getComputedStyle(root).getPropertyValue(name).trim();
        var n = parseFloat(raw);
        return Number.isFinite(n) ? n : fallback;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function applyWidth(px) {
        root.style.setProperty('--sidebar-w', px + 'px');
      }

      var min = cssPxVar('--sidebar-min', 240);
      var max = cssPxVar('--sidebar-max', 520);

      var saved = parseFloat(localStorage.getItem(STORAGE_KEY) || '');
      if (Number.isFinite(saved)) {
        applyWidth(clamp(saved, min, max));
      }

      var dragging = false;

      function onMove(ev) {
        if (!dragging) {
          return;
        }
        var next = clamp(ev.clientX, min, max);
        applyWidth(next);
      }

      function onUp() {
        if (!dragging) {
          return;
        }
        dragging = false;
        layout.classList.remove('is-resizing');
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        localStorage.setItem(STORAGE_KEY, parseFloat(getComputedStyle(root).getPropertyValue('--sidebar-w')) || min);
      }

      resizer.addEventListener('pointerdown', function (ev) {
        dragging = true;
        layout.classList.add('is-resizing');
        resizer.setPointerCapture(ev.pointerId);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
      });
  </script>

  <script>
    (function () {
      'use strict';

      var LANG_NAMES = {
        python: 'Python', r: 'R', julia: 'Julia',
        bash: 'Shell', sh: 'Shell', text: 'Output', markdown: 'Markdown'
      };

      function getLang(sourceDiv) {
        var pre = sourceDiv.querySelector('pre');
        if (!pre) return 'Code';
        var classes = Array.prototype.slice.call(pre.classList);
        for (var i = 0; i < classes.length; i++) {
          var cls = classes[i];
          if (cls === 'sourceCode') continue;
          return LANG_NAMES[cls] || (cls.charAt(0).toUpperCase() + cls.slice(1));
        }
        return 'Code';
      }

      // A <p><strong>…</strong></p> language label inserted by the markdown author
      function isLangLabel(node) {
        if (!node || node.nodeType !== Node.ELEMENT_NODE || node.tagName !== 'P') return false;
        var nonEmpty = Array.prototype.filter.call(node.childNodes, function (n) {
          return !(n.nodeType === Node.TEXT_NODE && n.textContent.trim() === '');
        });
        return nonEmpty.length === 1 && nonEmpty[0].tagName === 'STRONG';
      }

      function isWhitespace(node) {
        return node.nodeType === Node.TEXT_NODE && node.textContent.trim() === '';
      }

      // Two .sourceCode divs are consecutive if only whitespace or lang-label <p> nodes lie between them
      function areConsecutive(a, b) {
        var node = a.nextSibling;
        while (node) {
          if (node === b) return true;
          if (isWhitespace(node) || isLangLabel(node)) { node = node.nextSibling; continue; }
          return false;
        }
        return false;
      }

      function groupConsecutive(divs) {
        var groups = [];
        var i = 0;
        while (i < divs.length) {
          var run = [divs[i]];
          while (i + 1 < divs.length && areConsecutive(run[run.length - 1], divs[i + 1])) {
            i++;
            run.push(divs[i]);
          }
          groups.push(run);
          i++;
        }
        return groups;
      }

      function makeTabs(run) {
        var wrapper = document.createElement('div');
        wrapper.className = 'code-tabs';

        var tabBar = document.createElement('div');
        tabBar.className = 'code-tab-bar';
        wrapper.appendChild(tabBar);

        run.forEach(function (div, idx) {
          var btn = document.createElement('button');
          btn.className = 'code-tab-btn' + (idx === 0 ? ' active' : '');
          btn.textContent = getLang(div);
          btn.setAttribute('data-idx', String(idx));
          tabBar.appendChild(btn);

          var panel = document.createElement('div');
          panel.className = 'code-tab-panel' + (idx === 0 ? ' active' : '');
          panel.setAttribute('data-idx', String(idx));
          panel.appendChild(div);
          wrapper.appendChild(panel);
        });

        tabBar.addEventListener('click', function (e) {
          var btn = e.target;
          while (btn && !btn.classList.contains('code-tab-btn')) btn = btn.parentElement;
          if (!btn) return;
          var idx = btn.getAttribute('data-idx');
          Array.prototype.forEach.call(wrapper.querySelectorAll('.code-tab-btn'), function (b) { b.classList.remove('active'); });
          Array.prototype.forEach.call(wrapper.querySelectorAll('.code-tab-panel'), function (p) { p.classList.remove('active'); });
          btn.classList.add('active');
          wrapper.querySelector('.code-tab-panel[data-idx="' + idx + '"]').classList.add('active');
        });

        return wrapper;
      }

      function makeCollapsible(div) {
        var details = document.createElement('details');
        details.className = 'code-details';
        details.open = true;

        var summary = document.createElement('summary');
        summary.className = 'code-summary';
        summary.textContent = getLang(div);
        details.appendChild(summary);

        div.parentNode.insertBefore(details, div);
        details.appendChild(div);
      }

      function applyTabs(run) {
        var parent = run[0].parentNode;

        // Collect lang-label <p> nodes immediately preceding each code block in the run
        var toRemove = [];
        run.forEach(function (div) {
          var prev = div.previousSibling;
          while (prev && isWhitespace(prev)) prev = prev.previousSibling;
          if (prev && isLangLabel(prev)) toRemove.push(prev);
        });

        // Insertion point: the label before the first block (if it exists), else the first block
        var insertionPoint = run[0];
        if (toRemove.length > 0) {
          var firstLabel = toRemove[0];
          // Use firstLabel only if it genuinely precedes run[0]
          if (firstLabel.compareDocumentPosition(run[0]) & Node.DOCUMENT_POSITION_FOLLOWING) {
            insertionPoint = firstLabel;
          }
        }

        var placeholder = document.createTextNode('');
        parent.insertBefore(placeholder, insertionPoint);
        toRemove.forEach(function (el) { el.parentNode.removeChild(el); });

        var widget = makeTabs(run);
        parent.replaceChild(widget, placeholder);
      }

      document.addEventListener('DOMContentLoaded', function () {
        var all = Array.prototype.slice.call(
          document.querySelectorAll('.content div.sourceCode')
        );
        var groups = groupConsecutive(all);
        groups.forEach(function (run) {
          if (run.length >= 2) {
            applyTabs(run);
          } else {
            makeCollapsible(run[0]);
          }
        });
      });
    })();
  </script>

</body>
</html>
