<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nav-h:       56px;
      --sidebar-w:   320px;
      --sidebar-min: 240px;
      --sidebar-max: 520px;
      --accent:      #2563eb;
      --accent-dark: #1d4ed8;
      --bg:          #f9fafb;
      --surface:     #ffffff;
      --border:      #e5e7eb;
      --text:        #111827;
      --muted:       #6b7280;
      --code-bg:     #1e1e2e;
      --radius:      6px;
      --font-sans:   system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-mono:   "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
    }

    /* ── Top navbar ────────────────────────────────────────────────── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      gap: 1rem;
    }

    .navbar-brand {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .navbar-meta {
      font-size: .8rem;
      opacity: .75;
      white-space: nowrap;
    }

    /* ── Layout shell ──────────────────────────────────────────────── */
    .layout {
      display: flex;
      margin-top: var(--nav-h);
      min-height: calc(100vh - var(--nav-h));
    }

    /* ── Sidebar ───────────────────────────────────────────────────── */
    .sidebar {
      width: clamp(var(--sidebar-min), var(--sidebar-w), var(--sidebar-max));
      min-width: var(--sidebar-min);
      max-width: var(--sidebar-max);
      flex-shrink: 0;
      position: sticky;
      top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.25rem 0;
    }

    .sidebar-resizer {
      width: 10px;
      flex: 0 0 10px;
      cursor: col-resize;
      background: linear-gradient(to right, transparent 0, transparent 40%, var(--border) 40%, var(--border) 60%, transparent 60%, transparent 100%);
      user-select: none;
      touch-action: none;
    }

    .layout.is-resizing,
    .layout.is-resizing * {
      cursor: col-resize;
      user-select: none;
    }

    .sidebar-heading {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      padding: 0 1.25rem .5rem;
    }

    /* TOC generated by pandoc */
    #TOC {
      font-size: .83rem;
    }

    #TOC ul {
      list-style: none;
      padding: 0;
    }

    #TOC > ul { padding: 0; }

    #TOC li { line-height: 1.4; }

    #TOC a {
      display: block;
      padding: .3rem 1.25rem;
      color: var(--muted);
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: color .15s, border-color .15s, background .15s;
    }

    #TOC a:hover {
      color: var(--accent);
      background: #eff6ff;
      border-left-color: var(--accent);
    }

    /* Indent nested levels */
    #TOC ul ul a   { padding-left: 2rem;   font-size: .78rem; }
    #TOC ul ul ul a { padding-left: 2.75rem; font-size: .75rem; }

    /* ── Main content ──────────────────────────────────────────────── */
    .content {
      flex: 1;
      min-width: 0;
      padding: 2.5rem clamp(1.25rem, 5vw, 3.5rem);
      max-width: 860px;
    }

    /* ── Typography ────────────────────────────────────────────────── */
    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
      line-height: 1.25;
      margin-top: 2em;
      margin-bottom: .6em;
      color: var(--text);
      scroll-margin-top: calc(var(--nav-h) + 1rem);
    }

    h1 { font-size: 2rem; margin-top: 0; }
    h2 { font-size: 1.45rem; border-bottom: 1px solid var(--border); padding-bottom: .35em; }
    h3 { font-size: 1.15rem; }
    h4 { font-size: 1rem; }

    p { margin-bottom: 1rem; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    strong { font-weight: 650; }

    em { font-style: italic; }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    /* ── Tables ────────────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
      margin: 1.5rem 0;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    th {
      background: #f3f4f6;
      font-weight: 650;
      text-align: left;
      padding: .6rem .9rem;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: .55rem .9rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }

    /* ── Code ──────────────────────────────────────────────────────── */
    code {
      font-family: var(--font-mono);
      font-size: .85em;
      background: #f3f4f6;
      color: #be185d;
      padding: .15em .4em;
      border-radius: 3px;
    }

    pre {
      background: var(--code-bg);
      color: #cdd6f4;
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      overflow-x: auto;
      margin: 1.25rem 0;
      font-size: .83rem;
      line-height: 1.6;
      box-shadow: inset 0 1px 4px rgba(0,0,0,.3);
    }

    pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      font-size: inherit;
    }

    /* ── Blockquotes ───────────────────────────────────────────────── */
    blockquote {
      border-left: 4px solid var(--accent);
      margin: 1.5rem 0;
      padding: .75rem 1.25rem;
      background: #eff6ff;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #1e3a5f;
      font-style: italic;
    }

    /* ── Lists ─────────────────────────────────────────────────────── */
    ul, ol {
      padding-left: 1.75rem;
      margin-bottom: 1rem;
    }

    li { margin-bottom: .3rem; }

    /* ── Syntax highlight overrides (tango theme base) ─────────────── */
    $highlighting-css$

    /* ── Responsive: convert sidebar to top TOC on small screens ────── */
    @media (max-width: 768px) {
      .layout {
        display: block;
      }

      .sidebar {
        display: block;
        position: static;
        width: 100%;
        min-width: 0;
        max-width: none;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: .75rem 0;
      }

      .sidebar-heading {
        padding-bottom: .25rem;
      }

      #TOC a {
        padding-top: .4rem;
        padding-bottom: .4rem;
      }

      .sidebar-resizer { display: none; }
      .navbar-meta { display: none; }

      .content {
        max-width: 100%;
        padding-top: 1.25rem;
      }
    }

    /* ── Print ─────────────────────────────────────────────────────── */
    @media print {
      .navbar, .sidebar, .sidebar-resizer { display: none; }
      .content { padding: 0; max-width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <span class="navbar-brand">$title$</span>
$if(date)$    <span class="navbar-meta">$date$</span>$endif$
$if(author)$    <span class="navbar-meta">$author$</span>$endif$
  </nav>

  <div class="layout">

    <aside class="sidebar">
      <p class="sidebar-heading">Contents</p>
$if(toc)$      $table-of-contents$
$endif$
    </aside>

    <div class="sidebar-resizer" aria-hidden="true" title="Drag to resize sidebar"></div>

    <main class="content">
$body$
    </main>

  </div>

  <script>
    (function () {
      var root = document.documentElement;
      var layout = document.querySelector('.layout');
      var sidebar = document.querySelector('.sidebar');
      var resizer = document.querySelector('.sidebar-resizer');
      var STORAGE_KEY = 'llm_primer_sidebar_width';

      if (!layout || !sidebar || !resizer) {
        return;
      }

      function cssPxVar(name, fallback) {
        var raw = getComputedStyle(root).getPropertyValue(name).trim();
        var n = parseFloat(raw);
        return Number.isFinite(n) ? n : fallback;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function applyWidth(px) {
        root.style.setProperty('--sidebar-w', px + 'px');
      }

      var min = cssPxVar('--sidebar-min', 240);
      var max = cssPxVar('--sidebar-max', 520);

      var saved = parseFloat(localStorage.getItem(STORAGE_KEY) || '');
      if (Number.isFinite(saved)) {
        applyWidth(clamp(saved, min, max));
      }

      var dragging = false;

      function onMove(ev) {
        if (!dragging) {
          return;
        }
        var next = clamp(ev.clientX, min, max);
        applyWidth(next);
      }

      function onUp() {
        if (!dragging) {
          return;
        }
        dragging = false;
        layout.classList.remove('is-resizing');
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        localStorage.setItem(STORAGE_KEY, parseFloat(getComputedStyle(root).getPropertyValue('--sidebar-w')) || min);
      }

      resizer.addEventListener('pointerdown', function (ev) {
        dragging = true;
        layout.classList.add('is-resizing');
        resizer.setPointerCapture(ev.pointerId);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
      });
    })();
  </script>

</body>
</html>
